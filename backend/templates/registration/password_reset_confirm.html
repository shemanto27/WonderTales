<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password | Chef Starz</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --dark: #2D3436;
            --light: #F9F9F9;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
        }

        p {
            color: #636e72;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .success {
            background: #dff9fb;
            color: #0984e3;
            display: block;
        }

        .error {
            background: #ffeaa7;
            color: #d63031;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="form-container">
            <h1>New Password</h1>
            <p>Enter your new password below to reset your Chef Starz account access.</p>

            <form id="password-reset-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="password_confirm">Confirm New Password</label>
                    <input type="password" id="password_confirm" required placeholder="••••••••">
                </div>
                <button type="submit" id="submit-btn">Reset Password</button>
            </form>
        </div>

        <div id="status-message" class="message"></div>
    </div>

    <script>
        const form = document.getElementById('password-reset-form');
        const statusMsg = document.getElementById('status-message');
        const formContainer = document.getElementById('form-container');

        // Extract uid and token from the URL path
        // URL format: /.../confirm/UID/TOKEN/
        const pathParts = window.location.pathname.split('/').filter(part => part !== "");
        let token = decodeURIComponent(pathParts[pathParts.length - 1]);
        let uid = decodeURIComponent(pathParts[pathParts.length - 2]);

        form.onsubmit = async (e) => {
            e.preventDefault();

            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('password_confirm').value;

            if (p1 !== p2) {
                showStatus('Passwords do not match!', 'error');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Resetting...';

            console.log("Submitting reset with:", { uid, token });

            try {
                const response = await fetch('/v1/users/auth/password/reset/confirm/manual/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uid: uid,
                        token: token,
                        new_password1: p1,
                        new_password2: p2
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    formContainer.style.display = 'none';
                    showStatus('Success! Your password has been changed. You can now log in to the app.', 'success');
                } else {
                    let errorMsg = 'Failed to reset password.';

                    if (result.detail) {
                        errorMsg = result.detail;
                    } else if (result.non_field_errors) {
                        errorMsg = result.non_field_errors[0];
                    } else if (result.new_password1) {
                        errorMsg = 'Password Error: ' + result.new_password1[0];
                    } else if (result.new_password2) {
                        errorMsg = 'Confirmation Error: ' + result.new_password2[0];
                    } else {
                        // Fallback to the first available error message
                        const firstKey = Object.keys(result)[0];
                        if (firstKey && Array.isArray(result[firstKey])) {
                            errorMsg = result[firstKey][0];
                        }
                    }

                    showStatus(errorMsg, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Reset Password';
                }
            } catch (err) {
                showStatus('A network error occurred. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Reset Password';
            }
        };

        function showStatus(msg, type) {
            statusMsg.innerText = msg;
            statusMsg.className = 'message ' + type;
            statusMsg.style.display = 'block';
        }
    </script>

</body>

</html>
