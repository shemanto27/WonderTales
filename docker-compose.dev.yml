version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: wondertales-backend
    container_name: wondertales-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
    restart: always

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: wondertales-ai
    container_name: wondertales-ai
    ports:
      - "8001:8000"
    env_file:
      - ai/.env
    volumes:
      - ./ai:/app
    restart: always
