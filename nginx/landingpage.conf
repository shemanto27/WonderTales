server {
    server_name wondertaleshub.com www.wondertaleshub.com;
    server_tokens off;
    client_max_body_size 10M;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'";

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wondertaleshub.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wondertaleshub.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.wondertaleshub.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = wondertaleshub.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name wondertaleshub.com www.wondertaleshub.com;
    return 404; # managed by Certbot
}
